name: secret-scan
on: [push, pull_request]
jobs:
  trufflehog:
    runs-on: eks-secret-scan
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }  
      - name: Install TruffleHog
        run: curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin
      - name: Scan
        run: trufflehog git file://. --only-verified --json > trufflehog.json || true
      - name: Import to DefectDojo (internal DNS)
        run: |
          curl -sS -X POST "http://defectdojo-django.defectdojo.svc.cluster.local/api/v2/reimport-scan/" \
            -H "Authorization: Token ${{ secrets.DEFECTDOJO_TOKEN }}" \
            -F "scan_type=Trufflehog Scan" \
            -F "product_name=${{ github.repository }}" \
            -F "engagement_name=CI Secret Scan" \
            -F "auto_create_context=true" \
            -F "file=@trufflehog.json"
      - name: Fail build if secrets found
        run: test ! -s trufflehog.json   
